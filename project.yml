name: HiWiFi

options:
  bundleIdPrefix: com.cuostudio
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_PREVIEWS: "YES"

targets:
  HiWiFi:
    type: application
    platform: macOS
    sources:
      - path: HiWiFi
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        INFOPLIST_FILE: HiWiFi/Info.plist
        CODE_SIGN_ENTITLEMENTS: HiWiFi/HiWiFi.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.cuostudio.HiWiFi
        PRODUCT_NAME: "WiFi借一下"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        COMBINE_HIDPI_IMAGES: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    dependencies: []
    preBuildScripts: []
    postBuildScripts: []
